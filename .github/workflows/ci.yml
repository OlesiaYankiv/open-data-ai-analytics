name: Project CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      module:
        description: "Який модуль запустити? (або 'all')"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

jobs:
  run-modules:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality_analysis, data_research, visualization]

    if: ${{ github.event_name != 'workflow_dispatch' || inputs.module == 'all' || inputs.module == matrix.module }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib seaborn scikit-learn

      - name: Mock Data Directory (Workaround)
        run: |
          mkdir -p data/raw
          touch data/raw/glm_all_2024_portal.csv 

      - name: Run module ${{ matrix.module }}
        run: |
          mkdir -p artifacts
          echo "Запуск src/${{ matrix.module }}.py..."
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}_log.txt 2>&1 || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/