name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      module:
        description: "Select module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality_analysis
          - data_research
          - visualization

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.module }}" != "all" ]; then
            echo "matrix=[\"${{ github.event.inputs.module }}\"]" >> $GITHUB_OUTPUT
          else
            echo 'matrix=["data_load", "data_quality_analysis", "data_research", "visualization"]' >> $GITHUB_OUTPUT
          fi

  run-modules:
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.set-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create mock data
        run: |
          mkdir -p data/raw
          echo "dummy data" > data/raw/glm_all_2024_portal.csv

      - name: Run module
        run: |
          mkdir -p artifacts
          echo "Running src/${{ matrix.module }}.py"
          python src/${{ matrix.module }}.py > artifacts/${{ matrix.module }}_run.log 2>&1 || true

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.module }}
          path: artifacts/

      - name: Upload GitHub Pages artifact
        if: ${{ matrix.module == 'visualization' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/

  deploy-pages:
    needs: run-modules
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4